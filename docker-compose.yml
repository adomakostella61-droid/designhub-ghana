version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: designhub_ghana_db
    environment:
      POSTGRES_USER: designhub_user
      POSTGRES_PASSWORD: designhub_password
      POSTGRES_DB: designhub_ghana
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U designhub_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: designhub_ghana_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
